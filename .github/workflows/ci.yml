name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Lỗi (error) và cảnh báo (warning) sẽ làm CI fail.
      # Cảnh báo info (vd tên biến trong thuật toán lịch âm) thì bỏ qua.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
